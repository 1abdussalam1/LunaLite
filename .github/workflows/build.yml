name: Build Glossa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Generate icon
        run: python scripts/create_icon.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build EXE
        run: python build.py

      - name: Zip output
        run: |
          cd dist
          Compress-Archive -Path Glossa -DestinationPath Glossa-windows-x64.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glossa-windows-x64.zip
          name: Glossa ${{ github.ref_name }}
          body: |
            ## Glossa ${{ github.ref_name }}

            ### Download
            **Glossa-windows-x64.zip**

            ### Run
            1. Extract the zip
            2. Run `Glossa.exe`
            3. Enter your API Key and go!

            ### Requirements
            - Windows 10/11 (64-bit)
            - No Python or libraries needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
