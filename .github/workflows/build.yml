name: Build Glossa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Generate icon
        run: python scripts/create_icon.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build EXE
        run: python build.py

      - name: Download Textractor (bundle inside Glossa)
        run: |
          $url = "https://github.com/Artikash/Textractor/releases/download/v5.2.0/Textractor-5.2.0-Setup.zip"
          Invoke-WebRequest -Uri $url -OutFile textractor.zip
          Expand-Archive textractor.zip -DestinationPath dist\Glossa\Textractor
          Remove-Item textractor.zip

      - name: Download Tesseract (bundle inside Glossa)
        run: |
          $url = "https://github.com/UB-Mannheim/tesseract/releases/download/v5.4.0.20240606/tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          Invoke-WebRequest -Uri $url -OutFile tesseract_setup.exe
          Start-Process -FilePath tesseract_setup.exe -ArgumentList "/S /D=$PWD\dist\Glossa\Tesseract-OCR" -Wait
          Remove-Item tesseract_setup.exe

      - name: Download Tesseract language packs (JPN, CHI, KOR)
        run: |
          $tessdata = "dist\Glossa\Tesseract-OCR\tessdata"
          $base = "https://github.com/tesseract-ocr/tessdata/raw/main"
          foreach ($lang in @("jpn", "chi_sim", "kor", "eng")) {
            Invoke-WebRequest -Uri "$base/$lang.traineddata" -OutFile "$tessdata\$lang.traineddata"
          }

      - name: Zip output
        run: |
          cd dist
          Compress-Archive -Path Glossa -DestinationPath Glossa-windows-x64.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glossa-windows-x64.zip
          name: Glossa ${{ github.ref_name }}
          body: |
            ## Glossa ${{ github.ref_name }}

            ### Download
            **Glossa-windows-x64.zip**

            ### Run
            1. Extract the zip
            2. Run `Glossa.exe`
            3. Enter your API Key and go!

            ### Requirements
            - Windows 10/11 (64-bit)
            - No Python or libraries needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
